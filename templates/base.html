<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CMech Price Book{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand:       #E8500A;
      --brand-dark:  #C03F06;
      --bg:          #0F1117;
      --surface:     #1A1D27;
      --surface2:    #22263A;
      --border:      #2E3249;
      --text:        #E4E6F0;
      --muted:       #7B80A0;
      --success:     #2ECC71;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--surface);
      border-bottom: 2px solid var(--brand);
      padding: 0 1.5rem;
    }
    .navbar-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand) !important;
      letter-spacing: .5px;
    }
    .navbar-brand span { color: var(--text); }
    .nav-link {
      color: var(--muted) !important;
      font-weight: 500;
      padding: .85rem 1rem !important;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text) !important;
      border-bottom-color: var(--brand);
    }
    .nav-link i { margin-right: .35rem; }

    /* ── Page wrapper ── */
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }
    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .page-title i { color: var(--brand); }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .card-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: .95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: .85rem 1.25rem;
    }

    /* ── Forms ── */
    .form-label {
      font-weight: 600;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .form-control, .form-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: .55rem .9rem;
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface2);
      border-color: var(--brand);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(232,80,10,.2);
    }
    .form-control::placeholder { color: var(--muted); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.6); cursor: pointer; }

    /* ── Buttons ── */
    .btn-brand {
      background: var(--brand);
      border: none;
      color: #fff;
      font-weight: 700;
      border-radius: 7px;
      padding: .55rem 1.4rem;
      transition: background .2s, transform .1s;
    }
    .btn-brand:hover { background: var(--brand-dark); color: #fff; }
    .btn-brand:active { transform: scale(.98); }

    /* ── Alerts / flash ── */
    .flash-box {
      border-radius: 8px;
      padding: .8rem 1.1rem;
      margin-bottom: 1.25rem;
      font-weight: 500;
      font-size: .92rem;
      display: flex;
      align-items: flex-start;
      gap: .6rem;
    }
    .flash-error   { background: rgba(220,53,69,.15);  border: 1px solid rgba(220,53,69,.4);  color: #f08090; }
    .flash-success { background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.35); color: #6de0a0; }

    /* ── Table ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      background: var(--surface2);
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .data-table td {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }
    .price-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--brand);
    }
  </style>
</head>
<body>

{% if session.authenticated %}
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="{{ url_for('upload') }}">C<span>MECH</span></a>
  <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
    <i class="bi bi-list text-white fs-5"></i>
  </button>
  <div class="collapse navbar-collapse" id="nav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint=='upload' %}active{% endif %}" href="{{ url_for('upload') }}">
          <i class="bi bi-cloud-upload"></i>Upload Quotation
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint=='models' %}active{% endif %}" href="{{ url_for('models') }}">
          <i class="bi bi-car-front"></i>Car Models
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint=='search' %}active{% endif %}" href="{{ url_for('search') }}">
          <i class="bi bi-search"></i>Check Prices
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('logout') }}">
          <i class="bi bi-box-arrow-right"></i>Logout
        </a>
      </li>
    </ul>
  </div>
</nav>
{% endif %}

<div class="page-wrap">
  {% for msg in get_flashed_messages(with_categories=True) %}
    {% set cat = msg[0] %}
    {% set txt = msg[1] %}
    <div class="flash-box {{ 'flash-success' if cat == 'success' else 'flash-error' }}">
      <i class="bi {{ 'bi-check-circle-fill' if cat == 'success' else 'bi-exclamation-triangle-fill' }} mt-1"></i>
      <span>{{ txt }}</span>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
