<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMech — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand: #E8500A;
      --brand-dark: #C03F06;
      --bg: #0F1117;
      --surface: #1A1D27;
      --surface2: #22263A;
      --border: #2E3249;
      --text: #E4E6F0;
      --muted: #7B80A0;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .35;
      pointer-events: none;
    }
    .login-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--brand);
      border-radius: 12px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .brand-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 1px;
      text-align: center;
    }
    .brand-logo span { color: var(--text); }
    .sub-label {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .4px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .form-label {
      font-weight: 600;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
    }
    .form-control {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: .6rem 1rem;
    }
    .form-control:focus {
      background: var(--surface2);
      border-color: var(--brand);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(232,80,10,.2);
    }
    .form-control::placeholder { color: var(--muted); }
    .btn-brand {
      background: var(--brand);
      border: none;
      color: #fff;
      font-weight: 700;
      border-radius: 7px;
      padding: .65rem;
      width: 100%;
      font-size: 1rem;
      letter-spacing: .4px;
      transition: background .2s, transform .1s;
    }
    .btn-brand:hover { background: var(--brand-dark); color: #fff; }
    .btn-brand:active { transform: scale(.98); }
    .error-msg {
      background: rgba(220,53,69,.15);
      border: 1px solid rgba(220,53,69,.4);
      color: #f08090;
      border-radius: 7px;
      padding: .7rem 1rem;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo mb-1">C<span>MECH</span></div>
    <div class="sub-label">Price Book — Staff Login</div>

    {% with msgs = get_flashed_messages() %}
      {% if msgs %}
        <div class="error-msg">
          <i class="bi bi-exclamation-triangle-fill"></i>
          {{ msgs[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Enter access password" autofocus required>
      </div>
      <button type="submit" class="btn-brand mt-1">
        <i class="bi bi-unlock me-2"></i>Enter
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
